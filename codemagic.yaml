workflows:
  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
          # Realm binar fayllarini iOS uchun majburiy yuklash
          dart run realm install --target-os-type ios
      - name: Reset iOS Pods
        script: |
          cd ios
          # Kesh va eski fayllarni tozalash
          rm -rf Pods
          rm -rf Podfile.lock
          # CocoaPods repolarini yangilash va o'rnatish
          pod repo update
          pod install --repo-update
          cd ..
      - name: Flutter build ipa
        script: |
          # Build jarayoni
          flutter build ipa --release --no-codesign
    publishing:
      email:
        recipients:
          - karshievdev@gmail.com
