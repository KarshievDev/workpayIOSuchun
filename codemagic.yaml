workflows:
  ios-workflow:
    name: iOS Workflow
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Update CocoaPods repositories
        script: |
          # iOS kutubxonalar bazasini yangilash
          cd ios
          pod repo update
          pod install --repo-update
          cd ..
      - name: Flutter build ipa
        script: |
          # --no-codesign orqali vaqtincha sertifikatsiz build qilish
          flutter build ipa --release --no-codesign
    publishing:
      email:
        recipients:
          - karshievdev@gmail.com
